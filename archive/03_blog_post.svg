    <line x1="80" y1="1088" x2="220" y2="1088" stroke="#e5e7eb"/>
    <text x="80" y="1112" font-size="12" fill="#64748b">The 4.5× deploy speedup</text>
    <line x1="80" y1="1134" x2="220" y2="1134" stroke="#e5e7eb"/>
    <text x="80" y="1158" font-size="12" fill="#64748b">Autoscaling, finally</text>
    <line x1="80" y1="1180" x2="220" y2="1180" stroke="#e5e7eb"/>
    <text x="80" y="1204" font-size="12" fill="#64748b">What I'd do differently</text>
  </g>

  <!-- Body content -->
  <g>
    <text x="320" y="940" font-size="26" font-weight="700" fill="#0f172a">Why we left EC2</text>
    <rect x="320" y="970" width="640" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="990" width="600" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1010" width="580" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1030" width="540" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1070" width="640" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1090" width="620" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1110" width="500" height="12" rx="2" fill="#e5e7eb"/>

    <!-- Pull quote -->
    <line x1="320" y1="1170" x2="320" y2="1270" stroke="#10b981" stroke-width="3"/>
    <text x="340" y="1200" font-size="20" font-style="italic" fill="#0f172a">"45 services. 250 instances. Every</text>
    <text x="340" y="1228" font-size="20" font-style="italic" fill="#0f172a">deploy took 90 minutes. Something</text>
    <text x="340" y="1256" font-size="20" font-style="italic" fill="#0f172a">had to give."</text>

    <text x="320" y="1330" font-size="26" font-weight="700" fill="#0f172a">Picking EKS over ECS</text>
    <rect x="320" y="1360" width="640" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1380" width="600" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1400" width="580" height="12" rx="2" fill="#e5e7eb"/>

    <!-- Code block -->
    <rect x="320" y="1440" width="640" height="180" rx="8" fill="#0f172a"/>
    <text x="340" y="1468" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#94a3b8"># sample deployment manifest</text>
    <text x="340" y="1492" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace" fill="#a7f3d0">apiVersion: apps/v1</text>
    <text x="340" y="1514" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace" fill="#a7f3d0">kind: Deployment</text>
    <text x="340" y="1536" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace" fill="#e2e8f0">metadata:</text>
    <text x="358" y="1558" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace" fill="#e2e8f0">name: ingest-svc</text>
    <text x="340" y="1580" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace" fill="#e2e8f0">spec:</text>
    <text x="358" y="1602" font-size="12" font-family="ui-monospace, SFMono-Regular, monospace" fill="#e2e8f0">replicas: 3</text>

    <!-- Callout -->
    <rect x="320" y="1660" width="640" height="100" rx="8" fill="#fefce8" stroke="#fde047"/>
    <text x="340" y="1690" font-size="13" font-weight="700" fill="#854d0e">⚠ Heads-up</text>
    <text x="340" y="1714" font-size="13" fill="#854d0e">Pilot with a low-traffic service first. The first cutover teaches you 80% of the gotchas</text>
    <text x="340" y="1734" font-size="13" fill="#854d0e">in your stack, and you want to learn them when the blast radius is small.</text>

    <text x="320" y="1820" font-size="26" font-weight="700" fill="#0f172a">The 4.5× deploy speedup</text>
    <rect x="320" y="1850" width="640" height="12" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="1870" width="600" height="12" rx="2" fill="#e5e7eb"/>

    <!-- Inline figure -->
    <rect x="320" y="1910" width="640" height="200" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="340" y="1940" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#64748b">// fig 2. deploy time, before vs after</text>
    <rect x="380" y="1990" width="80" height="100" fill="#fca5a5"/>
    <text x="400" y="2108" font-size="11" fill="#64748b">EC2 · 90m</text>
    <rect x="520" y="2030" width="80" height="60" fill="#a7f3d0"/>
    <text x="540" y="2108" font-size="11" fill="#64748b">EKS · 20m</text>
    <text x="700" y="2030" font-size="13" font-weight="700" fill="#0f172a">↓ 4.5×</text>
    <text x="700" y="2052" font-size="11" fill="#64748b">deploy time</text>
    <text x="700" y="2080" font-size="13" font-weight="700" fill="#0f172a">↓ 30%</text>
    <text x="700" y="2102" font-size="11" fill="#64748b">infra cost</text>
  </g>

