<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 2400" font-family="-apple-system, system-ui, sans-serif">
  <rect width="1280" height="2400" fill="#ffffff"/>

  <!-- Top Nav -->
  <rect x="0" y="0" width="1280" height="72" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="80" y="44" fill="#0f172a" font-size="15" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace">~/navneet</text>
  <g font-size="13" fill="#374151">
    <text x="880" y="44">Work</text>
    <text x="940" y="44" font-weight="700" fill="#0f172a">Writing</text>
    <line x1="938" y1="50" x2="982" y2="50" stroke="#0f172a" stroke-width="2"/>
    <text x="1010" y="44">About</text>
    <text x="1065" y="44">Contact</text>
  </g>
  <rect x="1135" y="22" width="65" height="30" rx="6" fill="#0f172a"/>
  <text x="1145" y="42" font-size="12" fill="#ffffff">Resume</text>

  <!-- Breadcrumb -->
  <text x="80" y="120" font-size="12" fill="#64748b" font-family="ui-monospace, SFMono-Regular, monospace">← /writing/migrations</text>

  <!-- Title block -->
  <g>
    <rect x="320" y="160" width="110" height="24" rx="12" fill="#eef2ff"/>
    <text x="335" y="177" font-size="11" fill="#4338ca" font-family="ui-monospace, SFMono-Regular, monospace">MIGRATIONS</text>
    <text x="320" y="248" font-size="44" font-weight="700" fill="#0f172a">Migrating 45 services from</text>
    <text x="320" y="296" font-size="44" font-weight="700" fill="#0f172a">EC2/systemd to EKS — and</text>
    <text x="320" y="344" font-size="44" font-weight="700" fill="#0f172a">cutting deploys 4.5×</text>
    <rect x="320" y="378" width="640" height="14" rx="2" fill="#e5e7eb"/>
    <rect x="320" y="402" width="560" height="14" rx="2" fill="#e5e7eb"/>
    <text x="320" y="448" font-size="14" fill="#64748b" font-style="italic">A field report from leading a platform migration of 45 services and 250+ instances at a multi-tenant SaaS company.</text>

    <!-- Author meta row -->
    <circle cx="340" cy="500" r="20" fill="#e5e7eb"/>
    <text x="370" y="496" font-size="13" font-weight="700" fill="#0f172a">Navneet Lal Gupta</text>
    <text x="370" y="514" font-size="11" fill="#64748b" font-family="ui-monospace, SFMono-Regular, monospace">2026-05-14 · 9 min read · Updated 2026-05-16</text>
    <g font-size="11" fill="#374151">
      <rect x="780" y="485" width="34" height="30" rx="6" fill="#f3f4f6"/>
      <text x="790" y="504">𝕏</text>
      <rect x="820" y="485" width="34" height="30" rx="6" fill="#f3f4f6"/>
      <text x="830" y="504">in</text>
      <rect x="860" y="485" width="34" height="30" rx="6" fill="#f3f4f6"/>
      <text x="870" y="504">⧉</text>
    </g>
  </g>

  <!-- Cover: before/after architecture -->
  <rect x="320" y="550" width="640" height="320" rx="12" fill="#0f172a"/>
  <text x="340" y="582" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#94a3b8">// fig 1. before → after</text>

  <text x="380" y="620" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#fca5a5">BEFORE</text>
  <rect x="340" y="640" width="120" height="50" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="362" y="662" font-size="11" fill="#e2e8f0">EC2 instance</text>
  <text x="362" y="678" font-size="10" fill="#94a3b8">systemd · 90min deploy</text>

  <text x="500" y="670" font-size="14" fill="#ffffff">→</text>

  <text x="600" y="620" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#86efac">AFTER</text>
  <rect x="560" y="640" width="380" height="200" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="580" y="664" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#94a3b8">EKS cluster</text>
  <rect x="580" y="678" width="80" height="36" rx="4" fill="#0f172a" stroke="#10b981"/>
  <text x="599" y="700" font-size="10" fill="#a7f3d0">svc-a</text>
  <rect x="668" y="678" width="80" height="36" rx="4" fill="#0f172a" stroke="#10b981"/>
  <text x="687" y="700" font-size="10" fill="#a7f3d0">svc-b</text>
  <rect x="756" y="678" width="80" height="36" rx="4" fill="#0f172a" stroke="#10b981"/>
  <text x="773" y="700" font-size="10" fill="#a7f3d0">svc-c</text>
  <rect x="844" y="678" width="76" height="36" rx="4" fill="#0f172a" stroke="#10b981"/>
  <text x="857" y="700" font-size="10" fill="#a7f3d0">…×45</text>
  <text x="580" y="744" font-size="10" fill="#94a3b8">▸ autoscaling on</text>
  <text x="580" y="762" font-size="10" fill="#94a3b8">▸ 20min deploys (4.5× faster)</text>
  <text x="580" y="780" font-size="10" fill="#94a3b8">▸ infra cost −30%</text>
  <text x="580" y="798" font-size="10" fill="#94a3b8">▸ SRE-authored rollout runbooks</text>

  <!-- TOC (sticky left) -->
  <g>
    <text x="80" y="930" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2" font-family="ui-monospace, SFMono-Regular, monospace">// ON THIS PAGE</text>
    <line x1="80" y1="948" x2="220" y2="948" stroke="#0f172a" stroke-width="2"/>
