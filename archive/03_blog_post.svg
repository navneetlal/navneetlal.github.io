  <!-- Author bio block -->
  <rect x="80" y="2170" width="1120" height="140" rx="12" fill="#f9fafb" stroke="#e5e7eb"/>
  <circle cx="140" cy="2240" r="32" fill="#e5e7eb"/>
  <text x="190" y="2210" font-size="11" font-family="ui-monospace, SFMono-Regular, monospace" fill="#94a3b8">// AUTHOR</text>
  <text x="190" y="2238" font-size="16" font-weight="700" fill="#0f172a">Navneet Lal Gupta</text>
  <text x="190" y="2260" font-size="12" fill="#475569">Backend tech lead in Bangalore. I build distributed systems and lead platform migrations.</text>
  <text x="190" y="2280" font-size="12" fill="#64748b">Currently writing about data infra, Kubernetes, and how things actually break in production.</text>
  <rect x="1050" y="2222" width="130" height="36" rx="6" fill="#0f172a"/>
  <text x="1075" y="2245" font-size="12" fill="#ffffff">More posts →</text>

